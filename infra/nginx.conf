# =============================================================================
# TaskFlow nginx server block.
#
# Single virtual server doing three jobs:
#   1. /api/*  → strip the /api prefix, proxy to the Spring Boot upstream.
#   2. /ws     → WebSocket upgrade to the same upstream; long timeouts for
#                idle STOMP heartbeat lulls.
#   3. else    → serve the Angular SPA, falling back to index.html so client-
#                side routes (e.g. /boards/<uuid>) work on hard reload.
#
# TLS is intentionally NOT terminated here. Production deployments should put
# this container behind a TLS terminator (ALB / Cloudflare / Traefik / Caddy)
# that forwards on plain HTTP — and sets X-Forwarded-Proto so the Spring app's
# `forward-headers-strategy: framework` knows the original scheme was HTTPS,
# which in turn makes the Secure-cookie path do the right thing.
# =============================================================================

# Map the Upgrade request header to a connection-close directive when the
# header is absent. Required by NGINX for correct WebSocket proxying.
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen      80 default_server;
  listen      [::]:80 default_server;
  server_name _;

  # Reasonable upload ceiling (avatars, attachments later). Match server.max-http-form-post-size
  # if you ever add file uploads — currently the API is JSON-only.
  client_max_body_size 8m;

  # Compress everything text-ish. Binary assets (woff2, png) are already compressed.
  gzip              on;
  gzip_vary         on;
  gzip_min_length   1024;
  gzip_comp_level   6;
  gzip_proxied      any;
  gzip_types        text/plain text/css application/json application/javascript
                    application/xml application/xml+rss text/javascript
                    image/svg+xml application/vnd.ms-fontobject font/ttf;

  # --------------------------------------------------------------------
  # Security headers — defense in depth alongside Spring Security.
  # --------------------------------------------------------------------
  add_header X-Content-Type-Options "nosniff"        always;
  add_header X-Frame-Options         "DENY"           always;
  add_header Referrer-Policy         "no-referrer"    always;
  add_header Permissions-Policy      "geolocation=(), microphone=(), camera=()" always;

  # Docker embedded DNS. Variable-based proxy_pass re-resolves `api` when the
  # backend container is recreated (e.g. `docker compose up -d --build api`).
  # Without this, nginx keeps a stale IP and returns 502 HTML to the SPA.
  resolver 127.0.0.11 valid=10s ipv6=off;

  # --------------------------------------------------------------------
  # /api/* → backend (with /api prefix stripped to match dev proxy).
  # --------------------------------------------------------------------
  location /api/ {
    set $api_host api;
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass http://$api_host:8080;

    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Forwarded-Host  $host;

    # Pass through the trace id the SPA tags every request with — backend uses
    # it for log MDC + WebSocket echo dedup. Without `proxy_pass_request_headers`
    # NGINX would still forward it (it's a non-hop-by-hop header), but be explicit.
    proxy_set_header   X-Trace-Id        $http_x_trace_id;

    # Don't buffer SSE / large responses unnecessarily.
    proxy_buffering    off;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
  }

  # --------------------------------------------------------------------
  # /ws → STOMP-over-WebSocket. Needs Upgrade headers + long timeouts.
  # --------------------------------------------------------------------
  location = /ws {
    set $api_host api;
    proxy_pass         http://$api_host:8080/ws;
    proxy_http_version 1.1;

    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        $connection_upgrade;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;

    # WebSockets are long-lived. Anything under the heartbeat interval will
    # tear down healthy connections; pick a generous ceiling.
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  # --------------------------------------------------------------------
  # Static SPA.
  # --------------------------------------------------------------------
  root  /usr/share/nginx/html;
  index index.html;

  # Hashed bundles (e.g. main-3F4A2B.js) are content-addressed → cache forever.
  location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
    expires    1y;
    add_header Cache-Control "public, immutable";
    try_files  $uri =404;
  }

  # SPA fallback: any unmatched path serves index.html so the Angular router
  # can take over. Cache-busting on the HTML itself so deploys are picked up
  # on the next hard reload.
  location / {
    try_files  $uri $uri/ /index.html;
    add_header Cache-Control "no-cache, must-revalidate";
  }

  # NGINX's own healthcheck — used by the container HEALTHCHECK directive.
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }
}
