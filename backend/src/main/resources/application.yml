spring:
  application:
    name: taskflow-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # Virtual threads: every request handler / @Async task / scheduled task runs on a
  # virtual thread. Lets us handle 10k+ concurrent WebSocket connections without
  # tuning a fixed thread-pool. Requires JDK 21+.
  threads:
    virtual:
      enabled: true

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/taskflow}
    username: ${DB_USER:taskflow}
    password: ${DB_PASSWORD:taskflow}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:20}
      minimum-idle: 5
      connection-timeout: 10000
      pool-name: taskflow-hikari

  jpa:
    open-in-view: false   # OSIV is an anti-pattern; force explicit fetch boundaries
    hibernate:
      ddl-auto: validate  # Flyway owns schema; JPA only validates
    properties:
      hibernate:
        jdbc:
          batch_size: 50
          time_zone: UTC
        order_inserts: true
        order_updates: true
        format_sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:default}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
      ssl:
        enabled: true
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
  error:
    include-message: always
    include-binding-errors: always
  forward-headers-strategy: framework   # Honor X-Forwarded-* from Nginx

# Custom application properties — bound by typed @ConfigurationProperties classes
# in later steps (security, websocket).
taskflow:
  security:
    jwt:
      issuer: taskflow
      access-token-ttl: PT15M           # 15 minutes
      refresh-token-ttl: P7D            # 7 days, rotated on every use
      # WARNING: replace via env in production. Must be >= 32 bytes (HS256).
      secret: ${JWT_SECRET:change-me-in-production-this-secret-must-be-at-least-32-chars-long}
    cors:
      allowed-origins: ${CORS_ORIGINS:http://localhost:4200}
    cookie:
      # Set true in production (HTTPS). Local dev uses http://localhost:4200 → false.
      secure: ${COOKIE_SECURE:false}
      same-site: ${COOKIE_SAMESITE:Strict}
  websocket:
    allowed-origins: ${WS_ORIGINS:http://localhost:4200}
    heartbeat-interval-ms: 10000
  trash:
    retention-days: ${TRASH_RETENTION_DAYS:30}
    purge-cron: ${TRASH_PURGE_CRON:0 0 3 * * *}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    root: INFO
    io.taskflow: DEBUG
    org.springframework.web.socket: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{tenantId:-},%X{userId:-},%X{traceId:-}] %logger{36} - %msg%n"
